        // ===== Export All Data as DOCX =====
        function exportAllData() {
            try {
                const data = DataStore.exportAll();
                const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, BorderStyle, TableRow, TableCell, Table, WidthType } = docx;

                const children = [];

                // Title
                children.push(new Paragraph({
                    children: [new TextRun({ text: '科研吉娃娃 Genewawa — 实验数据导出报告', bold: true, size: 32, font: { name: 'SimSun' } })],
                    alignment: AlignmentType.CENTER,
                    spacing: { after: 200, line: 360 }
                }));

                // Export time
                children.push(new Paragraph({
                    children: [new TextRun({ text: `导出时间：${new Date().toLocaleString('zh-CN')}`, size: 24, font: { name: 'Times New Roman' }, color: '666666' })],
                    alignment: AlignmentType.CENTER,
                    spacing: { after: 400, line: 360 }
                }));

                // Projects
                data.projects.forEach((project, idx) => {
                    children.push(new Paragraph({
                        children: [new TextRun({ text: `项目 ${idx + 1}：${project.name}`, bold: true, size: 28, font: { name: 'SimSun' } })],
                        heading: HeadingLevel.HEADING_2,
                        spacing: { before: 300, after: 100, line: 360 }
                    }));

                    const projectFields = [
                        `项目编号：${project.id}`,
                        `负责人：${project.pi}`,
                        `研究目的：${project.purpose || '-'}`,
                        `研究假说：${project.hypothesis || '-'}`,
                        `伦理编号：${project.ethicsId || '-'}`,
                        `当前阶段：${project.stage || '-'}`,
                        `项目进度：${project.progress || 0}%`,
                        `累计实验：${project.totalExperiments || 0}`,
                        `最近实验：${project.lastExpDate || '-'}`
                    ];
                    if (project.riskNote) projectFields.push(`风险提示：${project.riskNote}`);

                    projectFields.forEach(field => {
                        children.push(new Paragraph({
                            children: [new TextRun({ text: field, size: 24, font: { name: 'SimSun' } })],
                            spacing: { after: 60, line: 360 }
                        }));
                    });

                    // Experiments for this project
                    const projectExps = data.experiments.filter(e => e.projectId === project.id);
                    if (projectExps.length > 0) {
                        children.push(new Paragraph({
                            children: [new TextRun({ text: `实验记录（共 ${projectExps.length} 条）`, bold: true, size: 24, font: { name: 'SimSun' } })],
                            spacing: { before: 200, after: 100, line: 360 }
                        }));

                        projectExps.forEach((exp, eIdx) => {
                            children.push(new Paragraph({
                                children: [new TextRun({ text: `实验 ${eIdx + 1}：${exp.id}`, bold: true, size: 24, font: { name: 'SimSun' } })],
                                spacing: { before: 150, after: 60, line: 360 }
                            }));

                            const expFields = [
                                `实验类型：${exp.type || '-'}`,
                                `操作者：${exp.operator || '-'}`,
                                `地点：${exp.location || '-'}`,
                                `开始时间：${exp.startTime ? new Date(exp.startTime).toLocaleString('zh-CN') : '-'}`,
                                `复核状态：${exp.reviewStatus === 'approved' ? '已通过' : exp.reviewStatus === 'rejected' ? '已驳回' : exp.reviewStatus === 'abnormal' ? '结果异常' : '待复核'}`
                            ];

                            expFields.forEach(field => {
                                children.push(new Paragraph({
                                    children: [new TextRun({ text: field, size: 24, font: { name: 'Times New Roman' } })],
                                    spacing: { after: 40, line: 360 }
                                }));
                            });

                            // Step data summary
                            if (exp.stepData) {
                                for (let s = 1; s <= 5; s++) {
                                    const sd = exp.stepData[`step${s}`];
                                    if (sd) {
                                        const stepNames = ['实验前准备', '样本与试剂处理', '核心实验操作', '质量控制', '结果记录'];
                                        const parts = [];
                                        Object.entries(sd).forEach(([k, v]) => {
                                            if (k !== 'files' && v) parts.push(`${k}: ${v}`);
                                        });
                                        if (parts.length > 0) {
                                            children.push(new Paragraph({
                                                children: [new TextRun({ text: `  步骤${s}(${stepNames[s-1]}): ${parts.join('; ')}`, size: 22, font: { name: 'SimSun' }, color: '444444' })],
                                                spacing: { after: 40, line: 360 }
                                            }));
                                        }
                                    }
                                }
                            }
                        });
                    }

                    // Separator
                    children.push(new Paragraph({
                        children: [new TextRun({ text: '—'.repeat(40), size: 20, color: 'CCCCCC' })],
                        spacing: { before: 200, after: 200, line: 360 }
                    }));
                });

                // Audit logs summary
                if (data.auditLogs && data.auditLogs.length > 0) {
                    children.push(new Paragraph({
                        children: [new TextRun({ text: `审计日志（最近 ${Math.min(data.auditLogs.length, 100)} 条）`, bold: true, size: 28, font: { name: 'SimSun' } })],
                        heading: HeadingLevel.HEADING_2,
                        spacing: { before: 300, after: 100, line: 360 }
                    }));

                    data.auditLogs.slice(0, 100).forEach(log => {
                        children.push(new Paragraph({
                            children: [new TextRun({
                                text: `[${new Date(log.timestamp).toLocaleString('zh-CN')}] ${log.action} — ${log.detail || ''} (${log.operator || '-'})`,
                                size: 22, font: { name: 'Times New Roman' }, color: '555555'
                            })],
                            spacing: { after: 40, line: 360 }
                        }));
                    });
                }

                const doc = new Document({
                    sections: [{
                        properties: {},
                        children: children
                    }]
                });

                Packer.toBlob(doc).then(blob => {
                    saveAs(blob, `Genewawa_数据导出_${formatDateFile(new Date())}.docx`);
                });

            } catch (err) {
                console.error('DOCX export error:', err);
                // Fallback to JSON
                const data = DataStore.exportAll();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Genewawa_export_${formatDateFile(new Date())}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('DOCX生成失败，已导出JSON格式。请检查网络连接后重试。');
            }
        }

        // ===== Tab Switching =====
        function switchTab(pageId) {
            // Update nav items
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Clear navigation stack and show page
            navigationStack = [];
            showPage(pageId);
            updateBackButton();

            // Show/hide bottom nav
            const bottomNav = document.getElementById('bottomNav');
            const appContainer = document.querySelector('.app-container');
            if (pageId === 'project-list' || pageId === 'my-profile') {
                bottomNav.classList.remove('hidden');
                appContainer.classList.remove('no-nav');
            } else {
                bottomNav.classList.add('hidden');
                appContainer.classList.add('no-nav');
            }

            // Render page content
            if (pageId === 'my-profile') {
                renderMyProfile();
            } else if (pageId === 'project-list') {
                renderProjectList();
            }
        }

        function addNewProject() {
            const name = document.getElementById('newProjectName').value.trim();
            const pi = document.getElementById('newProjectPI').value.trim();
            const purpose = document.getElementById('newProjectPurpose').value.trim();
            const hypothesis = document.getElementById('newProjectHypothesis').value.trim();
            const ethicsId = document.getElementById('newProjectEthics').value.trim();
            const riskLevel = document.getElementById('newProjectRisk').value;

            if (!name) { alert('请输入项目名称'); return; }
            if (!pi) { alert('请输入项目负责人'); return; }

            const date = new Date();
            const id = 'PRJ-' + date.getFullYear().toString().slice(2) +
                String(date.getMonth() + 1).padStart(2, '0') +
                String(date.getDate()).padStart(2, '0') + '-' +
                Math.random().toString(36).substr(2, 3).toUpperCase();

            const project = {
                id: id,
                name: name,
                purpose: purpose,
                hypothesis: hypothesis,
                pi: pi,
                ethicsId: ethicsId,
                stage: '未开始',
                progress: 0,
                totalExperiments: 0,
                lastExpDate: '',
                riskLevel: riskLevel,
                riskNote: '',
                createdAt: new Date().toISOString(),
                expectedIndicators: [],
                relatedSOPs: []
            };

            DataStore.saveProject(project);
            DataStore.addAuditLog({
                projectId: id,
                action: '创建项目',
                detail: `创建项目: ${name}`,
                operator: DataStore.getUserSettings().name || '当前用户'
            });

            hideAddProjectForm();
            renderProjectList();
            alert('项目创建成功！');
        }

        function confirmDeleteProject(id, name) {
            if (confirm(`确定要删除项目"${name}"吗？\n\n删除后该项目及其所有实验记录将被永久移除，此操作不可撤销。`)) {
                DataStore.deleteProject(id);
                DataStore.addAuditLog({
                    projectId: id,
                    action: '删除项目',
                    detail: `删除项目: ${name}`,
                    operator: DataStore.getUserSettings().name || '当前用户'
                });
                renderProjectList();
            }
        }

            const groups = DataStore.getGroups();

                <div class="profile-header">

                            </div>
                            <div class="form-group">
                                <label class="form-label">职称</label>

                                <label class="form-label">科室/系</label>
                                <input type="text" class="form-control" id="settingDept" value="${settings.department || ''}" placeholder="如：病理科、药理学系">
                            </div>
                            <div class="form-group">
                                <label class="form-label">实验室</label>
                                <input type="text" class="form-control" id="settingLab" value="${settings.lab || ''}" placeholder="如：3号楼B2层分子生物学实验室">
                            </div>
                            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing);">
                                <div class="form-group">
                                    <label class="form-label">手机</label>
                                    <input type="text" class="form-control" id="settingPhone" value="${settings.phone || ''}" placeholder="手机号码">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">邮箱</label>

                </div>

                <!-- Group Management -->
                <div class="settings-section">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">👥 课题组管理</span>
                            <button class="btn btn-sm btn-primary" onclick="showAddGroupForm()">＋ 新建</button>
                        </div>
                        <div class="card-body" id="groupList">
                            ${groups.length === 0 ? '<div class="empty-state"><div class="empty-text">暂无课题组</div></div>' :
                            groups.map(g => `
                                <div class="member-card" style="cursor:pointer;" onclick="openGroupManage('${g.id}')">
                                    <div class="member-info">
                                        <div class="member-avatar" style="background:var(--primary-blue);">组</div>
                                        <div>
                                            <div class="member-name">${g.name}</div>
                                            <div class="member-role">管理员：${g.admin || '未设置'} · ${g.members.length} 名成员</div>
                                        </div>
                                    </div>
                                    <span class="meta-tag primary">管理 →</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- About -->
                <div class="settings-section">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">ℹ️ 关于</span>
                        </div>
                        <div class="card-body" style="text-align:center;color:var(--gray-500);font-size:0.8rem;">

                            <p>医学科研项目全流程管理工具</p>

                        </div>
                    </div>
                </div>
            `;
        }

        function saveUserSettings() {
            const name = document.getElementById('settingName').value.trim();
            if (!name) {
                alert('请输入姓名');
                return;
            }
            const settings = {
                name: name,
                title: document.getElementById('settingTitle').value.trim(),
                department: document.getElementById('settingDept').value.trim(),
                lab: document.getElementById('settingLab').value.trim(),
                phone: document.getElementById('settingPhone').value.trim(),
                email: document.getElementById('settingEmail').value.trim()
            };
            DataStore.saveUserSettings(settings);
            alert('个人设置保存成功！');
            renderMyProfile();
        }

        // ===== Group Management =====
        function showAddGroupForm() {
            const name = prompt('请输入课题组名称：');
            if (!name || !name.trim()) return;

            const groups = DataStore.getGroups();
            const id = 'GRP-' + Date.now().toString(36).toUpperCase();
            const group = {
                id: id,
                name: name.trim(),
                admin: DataStore.getUserSettings().name || '',
                members: [],
                createdAt: new Date().toISOString()
            };
            DataStore.saveGroup(group);
            renderMyProfile();
            alert('课题组创建成功！');
        }

        function openGroupManage(groupId) {
            const groups = DataStore.getGroups();
            const group = groups.find(g => g.id === groupId);
            if (!group) return;
            currentGroup = group;

            const container = document.getElementById('groupManageContent');
            const userSettings = DataStore.getUserSettings();
            const isAdmin = group.admin === userSettings.name;

            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">👥 ${group.name}</span>
                        <span class="perm-badge admin">管理员：${group.admin || '未设置'}</span>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">管理员姓名</label>
                            <input type="text" class="form-control" id="groupAdmin" value="${group.admin || ''}" placeholder="课题组管理员姓名">
                            <div class="form-text">管理员拥有查看所有实验记录的权限</div>
                        </div>
                        <button class="btn btn-outline btn-block" onclick="saveGroupAdmin()">保存管理员</button>
                    </div>
                </div>

                <div class="card" style="margin-top:var(--spacing);">
                    <div class="card-header">
                        <span class="card-title">📋 成员列表 (${group.members.length})</span>

                    </div>
                    <div class="card-body">
                        ${group.members.length === 0 ? '<div class="empty-state"><div class="empty-text">暂无成员，点击上方添加</div></div>' :

                            <div class="member-card">
                                <div class="member-info">
                                    <div class="member-avatar">${m.name.charAt(0).toUpperCase()}</div>
                                    <div>
                                        <div class="member-name">${m.name}</div>
                                        <div class="member-role">${m.title || '成员'}</div>
                                    </div>
                                </div>
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <span class="perm-badge ${m.role === 'admin' ? 'admin' : m.role === 'member' ? 'member' : 'viewer'}">${m.role === 'admin' ? '管理员' : m.role === 'member' ? '可查看' : '仅查看'}</span>
                                    <button class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger);padding:2px 6px;" onclick="removeMember(${idx})">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="card" style="margin-top:var(--spacing);">
                    <div class="card-header">
                        <span class="card-title">🔐 权限说明</span>
                    </div>
                    <div class="card-body" style="font-size:0.8rem;color:var(--gray-600);line-height:1.8;">
                        <p><span class="perm-badge admin">管理员</span> 拥有所有权限：查看/管理所有实验记录、管理成员</p>
                        <p><span class="perm-badge member">可查看</span> 可查看课题组内所有项目的实验记录</p>
                        <p><span class="perm-badge viewer">仅查看</span> 仅可查看被授权项目的实验记录</p>
                        <div style="background:var(--info-light);padding:8px;border-radius:6px;margin-top:8px;">
                            💡 默认课题组管理员拥有所有成员的实验记录查看权限。如需限制特定人员的查看范围，可将其角色设为"仅查看"。
                        </div>
                    </div>
                </div>

                <button class="btn btn-outline btn-block" style="margin-top:var(--spacing);color:var(--danger);border-color:var(--danger);" onclick="confirmDeleteGroup()">删除课题组</button>
            `;

            navigateTo('group-manage');
        }

        function saveGroupAdmin() {
            const admin = document.getElementById('groupAdmin').value.trim();
            if (!admin) { alert('请输入管理员姓名'); return; }
            currentGroup.admin = admin;
            DataStore.saveGroup(currentGroup);
            alert('管理员设置成功！');
            openGroupManage(currentGroup.id);
        }

        function showAddMemberForm() {
            const name = prompt('请输入成员姓名：');
            if (!name || !name.trim()) return;
            const title = prompt('请输入成员职称（可选）：') || '';

            const role = prompt('请选择权限角色：\n1. 可查看（查看所有实验记录）\n2. 仅查看（仅查看授权项目）\n\n请输入 1 或 2：');
            const memberRole = (role === '2') ? 'viewer' : 'member';

            currentGroup.members.push({
                name: name.trim(),
                title: title.trim(),
                role: memberRole,
                addedAt: new Date().toISOString()
            });

            DataStore.saveGroup(currentGroup);
            openGroupManage(currentGroup.id);
        }

        function removeMember(idx) {
            if (confirm(`确定移除成员"${currentGroup.members[idx].name}"吗？`)) {
                currentGroup.members.splice(idx, 1);
                DataStore.saveGroup(currentGroup);
                openGroupManage(currentGroup.id);
            }
        }

        function confirmDeleteGroup() {
            if (confirm(`确定删除课题组"${currentGroup.name}"吗？\n\n此操作不可撤销。`)) {
                DataStore.deleteGroup(currentGroup.id);
                navigationStack = [];
                switchTab('my-profile');
                alert('课题组已删除');
            }
        }

        // ===== Initialization =====
        document.addEventListener('DOMContentLoaded', function() {
            DataStore.init();
            renderProjectList();

            // Initialize bottom nav visibility
            const bottomNav = document.getElementById('bottomNav');
            if (bottomNav) {
                bottomNav.classList.remove('hidden');
            }
        });
    
        function toggleSOPGuide(id) {
            document.getElementById(id).classList.toggle('open');
        }

            const expType = experimentData.type || '';
            const guides = {
                1: {
                    default: '<ol><li>核对实验SOP，确认操作步骤</li><li>检查样本编号、数量和保存状态</li><li>记录关键试剂批号和有效期</li><li>确认仪器正常运行并记录参数</li><li>涉及人体/动物实验确认伦理审批</li></ol><div class="tip">💡 提示：实验前准备充分是实验成功的关键，建议逐项核对后再开始</div>',
                    western: '<ol><li>准备RIPA裂解液(加蛋白酶/磷酸酶抑制剂，冰上)</li><li>检查电泳槽、转膜槽是否清洁</li><li>PVDF膜甲醇活化(10-30s)</li><li>配制新鲜封闭液(5%脱脂奶粉)</li><li>确认一抗、二抗在有效期内</li></ol><div class="tip">💡 WB关键：全程冰上操作蛋白提取；PVDF膜必须活化；内参选择GAPDH/β-actin</div>',
                    qpcr: '<ol><li>检查引物是否验证过效率和特异性</li><li>解冻cDNA模板和Master Mix(冰上)</li><li>设计96孔板布局(含3复孔+NTC)</li><li>检查qPCR仪器是否正常</li><li>确认内参基因在该条件下稳定</li></ol><div class="tip">💡 qPCR关键：分区操作防污染；技术重复CV<5%；熔解曲线验证特异性</div>',
                    cell: '<ol><li>显微镜检查细胞状态(形态、密度、污染)</li><li>确认培养基预热至37°C</li><li>准备胰酶(贴壁细胞)或离心管(悬浮细胞)</li><li>记录细胞代数和传代日期</li><li>确认CO2培养箱温度和气体</li></ol><div class="tip">💡 细胞实验关键：细胞汇合度60-80%时操作最佳；定期检测支原体</div>',
                    animal: '<ol><li>确认IACUC伦理审批有效</li><li>检查动物健康状态(精神/活动/体重)</li><li>准备给药器械(灌胃针/注射器)</li><li>计算给药剂量(按体重)</li><li>准备麻醉和镇痛药物</li></ol><div class="tip">💡 动物实验关键：3R原则；随机分组；盲法评估；记录伦理终点</div>'
                },
                2: {
                    default: '<ol><li>记录样本唯一编号</li><li>按SOP描述处理样本</li><li>记录试剂配制方法和浓度</li><li>控制反应温度和时间</li><li>标记处理后的样本</li></ol><div class="tip">💡 提示：样本处理是实验变异的主要来源，严格按SOP操作</div>',
                    western: '<ol><li>RIPA冰上裂解30min(每10min涡旋)</li><li>14000g 4°C离心15min取上清</li><li>BCA法测定蛋白浓度</li><li>调整所有样品至同一浓度</li><li>加Loading Buffer 95°C变性5min</li></ol><div class="tip">💡 蛋白提取关键：全程冰上；裂解液含抑制剂；定量后统一浓度</div>',
                    qpcr: '<ol><li>配制20μL反应体系(Master Mix 10μL)</li><li>每样品3个技术重复</li><li>光学封膜，离心去气泡</li><li>设置PCR程序(预变性+40循环+熔解曲线)</li><li>开始运行</li></ol><div class="tip">💡 qPCR加样关键：加样在冰上操作；避免气泡；封膜要压实</div>'
                },
                3: {
                    default: '<ol><li>按SOP执行核心实验操作</li><li>记录关键参数(温度/时间/转速)</li><li>注意观察实验现象</li><li>如有异常立即记录</li><li>拍照/录像记录关键步骤</li></ol><div class="tip">💡 提示：核心操作是实验成败关键，建议有经验者在场指导</div>',
                    western: '<ol><li>上样(20-40μg/孔)+蛋白Marker</li><li>电泳:80V浓缩胶→120V分离胶</li><li>转膜:300mA冰浴90min</li><li>封闭:5%脱脂奶粉1h</li><li>一抗4°C过夜→二抗1h→ECL显影</li></ol><div class="tip">💡 WB关键：转膜时冰浴降温；磷酸化蛋白用BSA封闭；ECL现配现用</div>',
                    qpcr: '<ol><li>监控扩增曲线是否正常</li><li>检查熔解曲线是否单峰</li><li>记录Ct值</li><li>确认NTC无扩增</li><li>导出原始数据</li></ol><div class="tip">💡 qPCR关键：熔解曲线单峰=特异性好；NTC无扩增=无污染</div>',
                    cell: '<ol><li>按实验方案处理细胞(加药/转染/刺激)</li><li>记录处理浓度和时间</li><li>显微镜观察细胞反应</li><li>拍照记录细胞状态</li><li>按方案收集细胞或继续培养</li></ol><div class="tip">💡 细胞处理关键：药物浓度需预实验确定；设溶剂对照</div>',
                    animal: '<ol><li>按方案给药/造模</li><li>记录给药剂量、途径、时间</li><li>观察动物反应</li><li>记录异常情况</li><li>术后动物护理(镇痛/保温)</li></ol><div class="tip">💡 动物操作关键：固定好动物防误伤；灌胃注意角度防误吸</div>'
                },
                4: {
                    default: '<ol><li>确认阳性对照结果正确</li><li>确认阴性对照无信号</li><li>检查重复间一致性(CV<15%)</li><li>记录仪器参数</li><li>判断是否偏离SOP</li></ol><div class="tip">💡 提示：质控是数据可信的保障，对照不合格需重做</div>'
                },
                5: {
                    default: '<ol><li>保存原始数据(未处理)</li><li>拍照记录结果(全幅、未裁剪)</li><li>记录初步结论</li><li>判断是否达到预期</li><li>规划下一步实验</li></ol><div class="tip">💡 提示：原始数据是科研的基石，切勿只保存处理后的图片</div>'
                }
            };

            const stepGuides = guides[stepNum] || guides[1];
            if (stepGuides.western && (expType.includes('western') || expType.includes('wb'))) return stepGuides.western;
            if (stepGuides.qpcr && (expType.includes('pcr') || expType.includes('qpcr'))) return stepGuides.qpcr;
            if (stepGuides.cell && (expType.includes('cell') || expType.includes('cck') || expType.includes('edu') || expType.includes('apoptosis') || expType.includes('cycle') || expType.includes('transwell') || expType.includes('wound'))) return stepGuides.cell;
            if (stepGuides.animal && (expType.includes('animal') || expType.includes('xenograft') || expType.includes('tumor'))) return stepGuides.animal;
            return stepGuides.default;
        }

    </script>
